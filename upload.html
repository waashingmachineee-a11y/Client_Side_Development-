<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Notes</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: url('https://images.unsplash.com/photo-1501504905252-473c47e087f8') no-repeat center center/cover;
      height: 100vh;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .card {
      border-radius: 15px;
      animation: fadeIn 0.8s ease-in-out;
      background: rgba(255,255,255,0.95);
    }

    .moving-text {
      color: white;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }

    .moving-text span {
      position: absolute;
      animation: moveText 10s linear infinite;
    }

    @keyframes moveText {
      from { left: -100%; }
      to { left: 100%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }

    .shake { animation: shake 0.3s; }

    .error { color: red; font-size: 0.9rem; }

    .success {
      color: green;
      text-align: center;
      margin-top: 10px;
      font-weight: 500;
      animation: fadeIn 0.5s ease-in-out;
    }

    button:hover {
      transform: scale(1.05);
      transition: 0.2s;
    }
  </style>
</head>
<body>

<div class="container mt-3">
  <div class="moving-text text-center mb-3">
    <span>📚 Upload Your Notes Easily - Share Files & Knowledge 📚</span>
  </div>
</div>

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow p-4">
        <h3 class="text-center mb-3">Upload Notes</h3>

        <form id="notesForm" novalidate>

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="name">
            <div class="error" id="nameError"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email">
            <div class="error" id="emailError"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Subject</label>
            <select class="form-select" id="subject">
              <option value="">Select Subject</option>
              <option>Client Side Development</option>
              <option>Introduction to Physical Computing</option>
            </select>
            <div class="error" id="subjectError"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Notes Title</label>
            <input type="text" class="form-control" id="title">
            <div class="error" id="titleError"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Upload File (PDF/DOC)</label>
            <input type="file" class="form-control" id="file">
            <div class="error" id="fileError"></div>
          </div>

          <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-success w-50 me-2">Upload</button>
            <button type="reset" class="btn btn-danger w-50">Reset</button>
          </div>

          <div class="success" id="successMsg"></div>

        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const form = document.getElementById('notesForm');

  function shakeField(id) {
    const field = document.getElementById(id);
    field.classList.add('shake');
    setTimeout(() => field.classList.remove('shake'), 300);
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    document.querySelectorAll('.error').forEach(el => el.textContent = '');
    document.getElementById('successMsg').textContent = '';

    let isValid = true;

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const subject = document.getElementById('subject').value;
    const title = document.getElementById('title').value.trim();
    const file = document.getElementById('file').files[0];

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (name === '') {
      document.getElementById('nameError').textContent = 'Please enter your name';
      shakeField('name');
      isValid = false;
    }

    if (email === '') {
      document.getElementById('emailError').textContent = 'Please enter your email';
      shakeField('email');
      isValid = false;
    } else if (!emailPattern.test(email)) {
      document.getElementById('emailError').textContent = 'Enter a valid email';
      shakeField('email');
      isValid = false;
    }

    if (subject === '') {
      document.getElementById('subjectError').textContent = 'Please select a subject';
      shakeField('subject');
      isValid = false;
    }

    if (title === '') {
      document.getElementById('titleError').textContent = 'Please enter notes title';
      shakeField('title');
      isValid = false;
    }

    if (!file) {
      document.getElementById('fileError').textContent = 'Please upload a file';
      shakeField('file');
      isValid = false;
    }

    if (isValid) {
      const data = { name, email, subject, title, fileName: file.name };
      localStorage.setItem('notesData', JSON.stringify(data));

      document.getElementById('successMsg').textContent = 'Notes uploaded successfully';
      form.reset();
    }
  });
</script>

</body>
</html>
